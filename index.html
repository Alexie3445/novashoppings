<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GoPods · AI Chat</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    /* ----- RESET & VARIABLES (WhatsApp inspired, orange/white/black) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-chat-list: #0f0f0f;
      --bg-chat-window: #0e0e0e;
      --bg-message-sent: #005c4b;
      --bg-message-received: #1f2c33;
      --bg-input: #2a2a2a;
      --orange-main: #ff7a00;
      --orange-hover: #e86e00;
      --orange-soft: #ffb347;
      --white: #ffffff;
      --white-soft: #e9edef;
      --gray-light: #b0b3b5;
      --gray-mid: #6a6a6a;
      --gray-dark: #3b3b3b;
      --shadow-orange: 0 8px 32px rgba(255, 122, 0, 0.25);
      --radius-lg: 28px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --radius-bubble: 8px;
      --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 20% 30%, #1f1a0e, #0a0a0a);
      overflow: hidden;
    }

    /* ----- PRELOADER (with percentage & 3D cart) ----- */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0b0b0b;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #preloader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .preloader-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }
    .cart-3d {
      font-size: 4.8rem;
      color: var(--orange-main);
      filter: drop-shadow(0 0 30px rgba(255, 122, 0, 0.5));
      animation: floatCart 2.2s infinite alternate ease-in-out;
    }
    .cart-3d i {
      display: block;
      transform: rotateX(10deg) rotateY(-10deg);
      text-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
    }
    @keyframes floatCart {
      0% { transform: translateY(-12px) scale(1) rotate(-2deg); }
      100% { transform: translateY(18px) scale(1.05) rotate(2deg); }
    }
    .preloader-title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--orange-main), var(--orange-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .loader-percent {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--white-soft);
      letter-spacing: 2px;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.2rem 1.6rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 122, 0, 0.15);
    }
    .progress-track {
      width: 220px;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.6);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange-main), var(--orange-soft));
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.4);
      transition: width 0.2s ease;
    }
    .preloader-sub {
      color: var(--gray-light);
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* ----- AUDIO - only for notification beep ----- */
    #bgAudio { display: none; }

    /* ----- MAIN APP CONTAINER (FULL SCREEN) ----- */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 100vh;
      background: var(--bg-secondary);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      position: relative;
      backdrop-filter: blur(4px);
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #app.visible { opacity: 1; }

    /* ----- LOGIN SCREEN (Amazon-style) ----- */
    #loginScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1.8rem;
      background: radial-gradient(circle at 50% 10%, #1a1a1a, #0a0a0a);
    }
    #loginScreen.hidden {
      display: none;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.2rem;
    }
    .login-logo i {
      font-size: 3.6rem;
      color: var(--orange-main);
      filter: drop-shadow(0 0 40px rgba(255, 122, 0, 0.25));
    }
    .login-logo h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--orange-main), var(--orange-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-top: 0.2rem;
    }
    .login-logo p {
      color: var(--gray-light);
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .input-group {
      position: relative;
    }
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-mid);
      font-size: 1rem;
      transition: var(--transition);
    }
    .input-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: var(--bg-input);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-sm);
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
    }
    .input-group input:focus {
      border-color: var(--orange-main);
      box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.1);
      background: #2a2a2a;
    }
    .input-group input:focus + i {
      color: var(--orange-main);
    }
    .input-group .toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--gray-mid);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }
    .input-group .toggle-pw:hover { color: var(--white); }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--gray-light);
    }
    .login-options label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .login-options input[type="checkbox"] {
      accent-color: var(--orange-main);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .login-options a {
      color: var(--orange-soft);
      text-decoration: none;
      transition: var(--transition);
      border-bottom: 1px solid transparent;
    }
    .login-options a:hover { border-bottom-color: var(--orange-soft); }

    .btn-login {
      background: linear-gradient(135deg, var(--orange-main), #e06700);
      border: none;
      padding: 1rem;
      border-radius: var(--radius-sm);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(255, 122, 0, 0.25);
      margin-top: 0.4rem;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 122, 0, 0.4);
      background: var(--orange-hover);
    }
    .btn-login:active { transform: scale(0.98); }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--gray-mid);
      font-size: 0.8rem;
      margin: 0.2rem 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    .login-footer {
      text-align: center;
      color: var(--gray-mid);
      font-size: 0.85rem;
    }
    .login-footer a {
      color: var(--orange-soft);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    .login-footer a:hover { color: var(--white); }

    .shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.4rem;
      margin-top: -0.4rem;
    }

    /* ----- WHATSAPP-STYLE CHAT APP (FULL SCREEN) ----- */
    #chatApp {
      flex: 1;
      display: none;
      flex-direction: column;
      background: var(--bg-secondary);
      height: 100vh;
    }
    #chatApp.active {
      display: flex;
    }

    /* WhatsApp header - compact */
    .app-header {
      background: #1f2c33;
      padding: 0.5rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
      min-height: 52px;
    }
    .app-header .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange-main), #e06700);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.15);
    }
    .app-header .info { flex: 1; }
    .app-header .info h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white-soft);
      letter-spacing: 0.2px;
    }
    .app-header .info p {
      font-size: 0.6rem;
      color: #8696a0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .app-header .info p i { font-size: 0.35rem; color: #4caf50; }
    .header-icons {
      display: flex;
      gap: 0.8rem;
      color: #aebac1;
      font-size: 1rem;
    }
    .header-icons i { transition: var(--transition); cursor: default; }
    .header-icons i:hover { color: var(--white-soft); }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #aebac1;
      padding: 0.15rem 0.6rem;
      border-radius: 40px;
      font-size: 0.6rem;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }
    .logout-btn:hover {
      border-color: var(--orange-main);
      color: white;
      background: rgba(255, 122, 0, 0.08);
    }

    /* HORIZONTAL SCROLLING CHAT LIST (small names) */
    .chat-list-wrapper {
      background: #111b21;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      padding: 0.3rem 0.6rem;
      scrollbar-width: thin;
      scrollbar-color: #374248 transparent;
      -webkit-overflow-scrolling: touch;
    }
    .chat-list-wrapper::-webkit-scrollbar {
      height: 3px;
    }
    .chat-list-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-list-wrapper::-webkit-scrollbar-thumb {
      background: #374248;
      border-radius: 10px;
    }

    .chat-list {
      display: inline-flex;
      gap: 0.3rem;
      padding: 0.2rem 0;
    }

    .chat-item {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      padding: 0.3rem 0.5rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      cursor: pointer;
      min-width: 56px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.02);
    }
    .chat-item:hover {
      background: rgba(255, 122, 0, 0.06);
      border-color: rgba(255, 122, 0, 0.1);
    }
    .chat-item.active {
      background: rgba(255, 122, 0, 0.12);
      border-color: rgba(255, 122, 0, 0.2);
    }
    .chat-item .c-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.8rem;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
    }
    .chat-item .c-name {
      font-size: 0.55rem;
      font-weight: 500;
      color: var(--white-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52px;
      text-align: center;
      line-height: 1.2;
    }
    .chat-item .badge {
      background: #25d366;
      color: #111b21;
      font-weight: 700;
      font-size: 0.5rem;
      padding: 0px 5px;
      border-radius: 40px;
      display: inline-block;
      min-width: 16px;
      text-align: center;
      position: absolute;
      top: -4px;
      right: -4px;
    }
    .chat-item .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    /* Chat window - takes remaining full space */
    #chatWindow {
      flex: 1;
      display: none;
      flex-direction: column;
      background: #0b141a;
      height: 100%;
      min-height: 0;
    }
    #chatWindow.active {
      display: flex;
    }

    .chat-window-header {
      padding: 0.4rem 0.8rem;
      background: #1f2c33;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
      min-height: 50px;
    }
    .chat-window-header .back-btn {
      background: transparent;
      border: none;
      color: #aebac1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
    }
    .chat-window-header .back-btn:hover { color: var(--white-soft); }
    .chat-window-header .cw-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.8rem;
      color: white;
    }
    .chat-window-header .cw-info { flex: 1; }
    .chat-window-header .cw-info h4 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--white-soft);
    }
    .chat-window-header .cw-info p {
      font-size: 0.6rem;
      color: #8696a0;
    }
    .chat-window-header .cw-info p i { font-size: 0.35rem; color: #4caf50; }

    /* Messages - scrollable with visible scrollbar */
    .messages-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem 0.8rem;
      background: #0b141a;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiMyMjIiIGZpbGwtb3BhY2l0eT0iMC4wNCI+PHBhdGggZD0iTTM2IDM0djItSDI0di0yaDEyek0zNiAyNHYySDI0di0yaDEyeiIvPjwvZz48L2c+PC9zdmc+');
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      scrollbar-width: thin;
      scrollbar-color: #374248 transparent;
    }
    .messages-wrapper::-webkit-scrollbar {
      width: 5px;
    }
    .messages-wrapper::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .messages-wrapper::-webkit-scrollbar-thumb {
      background: #374248;
      border-radius: 10px;
    }
    .messages-wrapper::-webkit-scrollbar-thumb:hover {
      background: #4a5a6a;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      width: 100%;
    }

    .messages .msg {
      max-width: 82%;
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius-bubble);
      font-size: 0.8rem;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
      margin-bottom: 0.1rem;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .messages .msg.received {
      align-self: flex-start;
      background: #1f2c33;
      color: var(--white-soft);
      border-top-left-radius: 2px;
    }
    .messages .msg.sent {
      align-self: flex-end;
      background: #005c4b;
      color: var(--white-soft);
      border-top-right-radius: 2px;
    }
    .messages .msg .msg-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 2px;
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .messages .msg.sent .msg-meta {
      color: rgba(255, 255, 255, 0.6);
    }
    .messages .msg .msg-meta i {
      font-size: 0.45rem;
      color: #53bdeb;
    }
    .messages .msg.sent .msg-meta i {
      color: #53bdeb;
    }

    /* Message input - compact */
    .message-input {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.6rem 0.4rem;
      background: #1f2c33;
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
    }
    .message-input .emoji-btn {
      background: transparent;
      border: none;
      color: #aebac1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
    }
    .message-input .emoji-btn:hover { color: var(--white-soft); }
    .message-input input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: none;
      background: #2a3942;
      color: var(--white-soft);
      font-size: 0.85rem;
      outline: none;
      transition: var(--transition);
    }
    .message-input input::placeholder { color: #8696a0; }
    .message-input input:focus {
      background: #2f3d47;
    }
    .message-input button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #005c4b;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .message-input button:hover {
      background: #006d59;
    }

    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8696a0;
      text-align: center;
      padding: 2rem;
      background: #111b21;
    }
    .empty-chat i {
      font-size: 3rem;
      color: var(--orange-main);
      opacity: 0.15;
      margin-bottom: 0.8rem;
    }
    .empty-chat h3 {
      color: var(--white-soft);
      font-weight: 400;
      font-size: 0.9rem;
    }
    .empty-chat p {
      font-size: 0.7rem;
      color: #8696a0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 0.4rem 0.8rem;
      background: #1f2c33;
      border-radius: var(--radius-bubble);
      border-top-left-radius: 2px;
      font-size: 0.75rem;
      color: #8696a0;
      gap: 4px;
      align-items: center;
    }
    .typing-indicator.active {
      display: flex;
    }
    .typing-indicator .dots {
      display: flex;
      gap: 3px;
    }
    .typing-indicator .dots span {
      width: 6px;
      height: 6px;
      background: #8696a0;
      border-radius: 50%;
      animation: dotBounce 1.4s infinite;
    }
    .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 500px) {
      #app { height: 100vh; max-height: 100vh; border-radius: 0; border: none; }
    }
  </style>
</head>
<body>

  <!-- PRELOADER -->
  <div id="preloader">
    <div class="preloader-content">
      <div class="cart-3d"><i class="fas fa-shopping-cart"></i></div>
      <div class="preloader-title">GoPods</div>
      <div class="loader-percent" id="percentDisplay">0%</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="preloader-sub">loading experience</div>
    </div>
  </div>

  <!-- AUDIO - only for notification beep -->
  <audio id="bgAudio" preload="auto"></audio>
  <audio id="notifBeep" preload="auto">
    <source src="data:audio/wav;base64,U3R1ZmZUdXJyAAAAAAD//w==" type="audio/wav">
  </audio>

  <!-- MAIN APP -->
  <div id="app">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
      <div class="login-logo">
        <i class="fas fa-shopping-bag"></i>
        <h1>GoPods</h1>
        <p>Sign in to start chatting</p>
      </div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="Email or phone" value="demo@gopods.com" />
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Password" value="password123" />
          <button class="toggle-pw" type="button" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></button>
        </div>
        <div class="login-options">
          <label><input type="checkbox" checked /> Keep me signed in</label>
          <a href="#">Forgot password?</a>
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn-login">Sign In <i class="fas fa-arrow-right" style="margin-left:8px;"></i></button>
        <div class="login-divider">New to GoPods?</div>
        <div class="login-footer">
          <a href="#" id="createAccountLink">Create your account</a>
          <span style="color:var(--gray-mid); margin-left:4px;">(demo: use any credentials)</span>
        </div>
      </form>
    </div>

    <!-- WHATSAPP-STYLE CHAT APP (FULL SCREEN) -->
    <div id="chatApp">
      <!-- Header -->
      <div class="app-header">
        <div class="avatar">G</div>
        <div class="info">
          <h2>GoPods</h2>
          <p><i class="fas fa-circle"></i> 3 sellers online</p>
        </div>
        <div class="header-icons">
          <i class="fas fa-search"></i>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Horizontal scrollable chat list -->
      <div class="chat-list-wrapper">
        <div class="chat-list" id="chatList"></div>
      </div>

      <!-- Chat Window -->
      <div id="chatWindow">
        <div class="chat-window-header">
          <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
          <div class="cw-avatar" id="cwAvatar">U</div>
          <div class="cw-info">
            <h4 id="cwName">User</h4>
            <p><i class="fas fa-circle"></i> online</p>
          </div>
          <div style="color: #aebac1; display:flex; gap:0.6rem;">
            <i class="fas fa-phone"></i>
            <i class="fas fa-video"></i>
          </div>
        </div>
        <div class="messages-wrapper" id="messagesWrapper">
          <div class="messages" id="messageContainer">
            <div class="typing-indicator" id="typingIndicator">
              <span>typing</span>
              <div class="dots">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
        </div>
        <div class="message-input">
          <button class="emoji-btn"><i class="far fa-smile"></i></button>
          <input type="text" id="msgInput" placeholder="Type a message" />
          <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-chat" id="emptyChat">
        <i class="fas fa-comments"></i>
        <h3>Select a seller to start chatting</h3>
        <p>Discuss GoPods prices & availability</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- PRELOADER -----
      const preloader = document.getElementById('preloader');
      const percentDisplay = document.getElementById('percentDisplay');
      const progressFill = document.getElementById('progressFill');
      const app = document.getElementById('app');

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 8) + 2;
        if (progress > 100) progress = 100;
        percentDisplay.textContent = progress + '%';
        progressFill.style.width = progress + '%';
        if (progress === 100) {
          clearInterval(interval);
          setTimeout(() => {
            preloader.classList.add('hide');
            app.classList.add('visible');
            speakWelcome();
          }, 400);
        }
      }, 140);

      function speakWelcome() {
        if ('speechSynthesis' in window) {
          const msg = 'Welcome to GoPods. Please sign in to continue.';
          const utterance = new SpeechSynthesisUtterance(msg);
          utterance.rate = 0.9;
          utterance.pitch = 1.1;
          window.speechSynthesis.speak(utterance);
        }
      }

      window.togglePassword = function(inputId, btn) {
        const inp = document.getElementById(inputId);
        if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="fas fa-eye-slash"></i>'; }
        else { inp.type = 'password'; btn.innerHTML = '<i class="fas fa-eye"></i>'; }
      };

      // ----- LOGIN -----
      const loginScreen = document.getElementById('loginScreen');
      const chatApp = document.getElementById('chatApp');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!email || !password) {
          loginError.textContent = 'Please enter your email and password.';
          loginScreen.classList.add('shake');
          setTimeout(() => loginScreen.classList.remove('shake'), 400);
          return;
        }

        loginError.textContent = '';
        loginScreen.classList.add('hidden');
        chatApp.classList.add('active');
        initChat();
        if ('speechSynthesis' in window) {
          const msg = 'You are now signed in. Start chatting with sellers.';
          const utterance = new SpeechSynthesisUtterance(msg);
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      });

      document.getElementById('createAccountLink').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('loginEmail').value = 'demo@gopods.com';
        document.getElementById('loginPassword').value = 'password123';
        loginForm.dispatchEvent(new Event('submit'));
      });

      document.getElementById('logoutBtn').addEventListener('click', function() {
        chatApp.classList.remove('active');
        loginScreen.classList.remove('hidden');
        document.getElementById('chatWindow').classList.remove('active');
        document.getElementById('emptyChat').style.display = 'flex';
        document.getElementById('chatList').innerHTML = '';
        currentSellerId = null;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      });

      // ----- AI RESPONSE ENGINE -----
      function generateAIResponse(userMessage, sellerName) {
        const msg = userMessage.toLowerCase();
        
        // Product related questions
        if (msg.includes('price') || msg.includes('cost') || msg.includes('how much')) {
          const prices = ['$89', '$75', '$95', '$80', '$70', '$99'];
          return `The current price is ${prices[Math.floor(Math.random() * prices.length)]} per unit. I can offer a discount for bulk orders!`;
        }
        if (msg.includes('stock') || msg.includes('available') || msg.includes('have')) {
          const stocks = ['5 units', '8 units', '3 units', '12 units', '6 units', '10 units'];
          return `I have ${stocks[Math.floor(Math.random() * stocks.length)]} in stock right now. When would you need them?`;
        }
        if (msg.includes('ship') || msg.includes('delivery') || msg.includes('shipping')) {
          return `Shipping usually takes 2-3 business days. I can expedite it if you need it sooner!`;
        }
        if (msg.includes('color') || msg.includes('black') || msg.includes('white') || msg.includes('red')) {
          return `I have Black, White, and Blue available. Which color would you prefer?`;
        }
        if (msg.includes('warranty') || msg.includes('guarantee')) {
          return `All GoPods come with a 1-year warranty. We also offer extended warranty for an additional $15.`;
        }
        if (msg.includes('discount') || msg.includes('cheap') || msg.includes('deal')) {
          return `I can give you 10% off if you order 3 or more units. Let me know how many you need!`;
        }
        if (msg.includes('hello') || msg.includes('hi') || msg.includes('hey')) {
          return `Hello! How can I help you with your GoPods purchase today?`;
        }
        if (msg.includes('thank')) {
          return `You're welcome! Let me know if you have any other questions.`;
        }
        if (msg.includes('bye') || msg.includes('goodbye')) {
          return `Goodbye! Feel free to reach out anytime about GoPods.`;
        }
        
        // Default AI response
        const defaultResponses = [
          `Great question! Let me check that for you.`,
          `I understand. The GoPods are really popular right now.`,
          `That's a good point. I'd recommend the Pro version for that.`,
          `Let me get more details on that for you.`,
          `I appreciate your interest in GoPods!`,
          `That's exactly what I was thinking too.`,
          `Based on your needs, I'd suggest the GoPod Mini.`,
          `I'll make sure you get the best deal possible.`
        ];
        return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
      }

      // ----- CHAT DATA -----
      const sellers = [
        { id: 1, name: 'Liam', avatar: 'LK', lastMsg: 'Got the GoPod Pro?', time: '12:34', unread: 2 },
        { id: 2, name: 'Mia', avatar: 'MS', lastMsg: 'Price for 3 units?', time: '11:20', unread: 0 },
        { id: 3, name: 'Noah', avatar: 'NJ', lastMsg: 'Ready to ship tomorrow', time: '09:15', unread: 1 },
        { id: 4, name: 'Emma', avatar: 'EW', lastMsg: 'I have 5 in stock', time: 'Yesterday', unread: 0 },
        { id: 5, name: 'Olivia', avatar: 'OM', lastMsg: 'Can you ship today?', time: '08:30', unread: 0 },
        { id: 6, name: 'James', avatar: 'JW', lastMsg: 'Got the mini version?', time: 'Yesterday', unread: 0 },
      ];

      const chatHistory = {
        1: [{ text: 'Hey! Do you have the GoPod Pro in black?', sent: false, time: '12:30' },
            { text: 'Yes, I have 2 units. Price $89 each.', sent: true, time: '12:31' },
            { text: 'Great! I\'ll take both.', sent: false, time: '12:33' }],
        2: [{ text: 'Hi, how many GoPods do you have?', sent: false, time: '11:10' },
            { text: 'I have 6 units, various colors.', sent: true, time: '11:12' },
            { text: 'Can you do $75 per unit?', sent: false, time: '11:18' }],
        3: [{ text: 'Is the GoPod Mini available?', sent: false, time: '09:00' },
            { text: 'Yes, I have 4. Shipping is fast.', sent: true, time: '09:05' }],
        4: [{ text: 'I need a GoPod for my business.', sent: false, time: 'Yesterday' },
            { text: 'I have 5 in stock, $80 each.', sent: true, time: 'Yesterday' }],
        5: [{ text: 'Can you ship today?', sent: false, time: '08:30' },
            { text: 'Yes, I can ship within 2 hours.', sent: true, time: '08:35' }],
        6: [{ text: 'Got the mini version?', sent: false, time: 'Yesterday' },
            { text: 'Yes, I have 3 minis in stock.', sent: true, time: 'Yesterday' }]
      };

      let currentSellerId = null;

      const chatListEl = document.getElementById('chatList');
      const chatWindow = document.getElementById('chatWindow');
      const emptyChat = document.getElementById('emptyChat');
      const messageContainer = document.getElementById('messageContainer');
      const messagesWrapper = document.getElementById('messagesWrapper');
      const typingIndicator = document.getElementById('typingIndicator');
      const cwName = document.getElementById('cwName');
      const cwAvatar = document.getElementById('cwAvatar');
      const msgInput = document.getElementById('msgInput');
      const sendBtn = document.getElementById('sendMsgBtn');
      const backBtn = document.getElementById('backBtn');

      // Notification beep
      function playBeep() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          oscillator.frequency.value = 800;
          oscillator.type = 'sine';
          gainNode.gain.value = 0.3;
          oscillator.start();
          oscillator.stop(ctx.currentTime + 0.15);
        } catch(e) {
          const audio = document.getElementById('notifBeep');
          if (audio) {
            audio.play().catch(() => {});
          }
        }
      }

      function getColor(id) {
        const colors = ['#e05a00', '#cc7a00', '#d94f00', '#b86b00', '#c07a00', '#a86a00'];
        return colors[(id-1) % colors.length];
      }

      function renderChatList() {
        chatListEl.innerHTML = '';
        sellers.forEach(seller => {
          const item = document.createElement('div');
          item.className = 'chat-item' + (currentSellerId === seller.id ? ' active' : '');
          const history = chatHistory[seller.id] || [];
          const last = history.length ? history[history.length-1] : { text: 'Start...' };
          const preview = last.text.length > 12 ? last.text.slice(0,10)+'…' : last.text;
          const badge = seller.unread ? `<span class="badge">${seller.unread}</span>` : '';
          item.innerHTML = `
            <div class="avatar-wrapper">
              <div class="c-avatar" style="background:${getColor(seller.id)};">${seller.avatar}</div>
              ${badge}
            </div>
            <div class="c-name">${seller.name}</div>
          `;
          item.dataset.id = seller.id;
          item.addEventListener('click', () => openChat(seller.id));
          chatListEl.appendChild(item);
        });
      }

      function openChat(id) {
        currentSellerId = id;
        const seller = sellers.find(s => s.id === id);
        if (!seller) return;
        cwName.textContent = seller.name;
        cwAvatar.textContent = seller.avatar;
        cwAvatar.style.background = getColor(id);
        chatWindow.classList.add('active');
        emptyChat.style.display = 'none';
        renderMessages(id);
        renderChatList();
        // Reset unread count
        seller.unread = 0;
        setTimeout(() => { 
          messagesWrapper.scrollTop = messagesWrapper.scrollHeight; 
        }, 50);
      }

      function renderMessages(id) {
        messageContainer.innerHTML = '';
        // Add typing indicator as first element (hidden by default)
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
          <span>typing</span>
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
        `;
        messageContainer.appendChild(typingDiv);
        
        const msgs = chatHistory[id] || [];
        msgs.forEach(msg => {
          const div = document.createElement('div');
          div.className = 'msg ' + (msg.sent ? 'sent' : 'received');
          const status = msg.sent ? '<i class="fas fa-check-double"></i>' : '';
          div.innerHTML = `${msg.text} <div class="msg-meta">${msg.time || ''} ${status}</div>`;
          messageContainer.appendChild(div);
        });
        messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
      }

      function showTyping(show) {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
          if (show) {
            indicator.classList.add('active');
          } else {
            indicator.classList.remove('active');
          }
        }
      }

      function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || currentSellerId === null) return;
        const sellerId = currentSellerId;
        if (!chatHistory[sellerId]) chatHistory[sellerId] = [];
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        chatHistory[sellerId].push({ text: text, sent: true, time: timeStr });
        renderMessages(sellerId);
        msgInput.value = '';
        renderChatList();
        messagesWrapper.scrollTop = messagesWrapper.scrollHeight;

        // Show typing indicator
        showTyping(true);
        messagesWrapper.scrollTop = messagesWrapper.scrollHeight;

        // AI response with delay
        const delay = 800 + Math.random() * 1200;
        setTimeout(() => {
          const seller = sellers.find(s => s.id === sellerId);
          const sellerName = seller ? seller.name : 'Seller';
          const reply = generateAIResponse(text, sellerName);
          
          if (currentSellerId === sellerId) {
            chatHistory[sellerId].push({ text: reply, sent: false, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
            showTyping(false);
            renderMessages(sellerId);
            renderChatList();
            playBeep();
            messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
          } else {
            chatHistory[sellerId].push({ text: reply, sent: false, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
            const sellerObj = sellers.find(s => s.id === sellerId);
            if (sellerObj) sellerObj.unread = (sellerObj.unread || 0) + 1;
            renderChatList();
            playBeep();
          }
        }, delay);
      }

      function goBack() {
        chatWindow.classList.remove('active');
        emptyChat.style.display = 'flex';
        currentSellerId = null;
        renderChatList();
      }

      sendBtn.addEventListener('click', sendMessage);
      msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
      backBtn.addEventListener('click', goBack);

      function initChat() {
        renderChatList();
        emptyChat.style.display = 'flex';
        chatWindow.classList.remove('active');
      }

    })();
  </script>
</body>
</html>
